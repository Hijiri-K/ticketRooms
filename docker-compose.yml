services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://rooms:rooms_password@db:5432/rooms
    env_file:
      - .env.local
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm run dev"

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: rooms
      POSTGRES_PASSWORD: rooms_password
      POSTGRES_DB: rooms
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rooms"]
      interval: 5s
      timeout: 5s
      retries: 5

  stripe-cli:
    image: stripe/stripe-cli:latest
    command: listen --forward-to app:3000/api/webhooks/stripe
    env_file:
      - .env.local
    depends_on:
      - app
    profiles:
      - stripe

volumes:
  postgres_data:
